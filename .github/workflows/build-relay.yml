name: Build Relay

# 推送到 main 或打 relay-v* tag 时，交叉编译 Go 中转服务多平台二进制，
# 上传为 workflow artifact，便于下载部署。
# PR 仅在 relay/ 变更时触发以节省 CI。
# 打 relay-v* tag 时额外发布到 GitHub Releases。
#
# relay 与 npm 包（package.json）各自独立版本化：relay 用 relay-v*，
# npm 包未来用 v*。互不干扰。
#
# 注意：paths 不能放在 push 块里——它会同时约束 branches 和 tags，
# 导致 tag 指向的 commit 若在 relay/ 下无 diff 就不触发，Release 永远建不出来。
# 因此 push 不配 paths（保证 tag 100% 触发），仅在 pull_request 上用 paths 省 CI。
on:
  push:
    branches: [main]
    tags:
      - "relay-v*"
  pull_request:
    paths:
      - "relay/**"
      - ".github/workflows/build-relay.yml"
  workflow_dispatch:

permissions:
  contents: write # 打 tag 时发布 Release 需要

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: relay/go.sum

      - name: Build
        working-directory: relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} .
          go vet ./...

      - name: Compress (tar.gz)
        if: matrix.goos != 'windows'
        working-directory: relay
        run: tar -czf dist/claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C dist claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Compress (zip)
        if: matrix.goos == 'windows'
        working-directory: relay
        run: cd dist && zip claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}.zip claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            relay/dist/claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            relay/dist/claude-web-ui-relay-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          if-no-files-found: error

  release:
    name: Release (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/relay-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Claude WebUI 中转服务

            下载对应平台的压缩包，解压后部署到 VPS。详见 [relay/README.md](https://github.com/${{ github.repository }}/blob/main/relay/README.md)。

            ### 校验

            ```bash
            ./claude-web-ui-relay --listen 127.0.0.1:8787
            curl -i http://127.0.0.1:8787/  # 期望 HTTP 200（/healthz 已于 v0.1.4 移除，根路径返回空 200 作探活）
            ```
